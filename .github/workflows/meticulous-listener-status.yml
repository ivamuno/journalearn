name: Debug Meticulous Status Events

on:
  status:
  
jobs:
  debug:
    runs-on: ubuntu-latest
    if: |
      (github.event.state == 'success' || github.event.state == 'failure' || github.event.state == 'error') &&
      github.ref == 'refs/heads/main'
    steps:
      - name: Event summary
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "State: ${{ github.event.state }}"
          echo "Branches: ${{ github.event.branches }}"
          echo "Branches JSON: ${{ toJson(github.event.branches) }}"
          echo "Contains main: ${{ contains(toJson(github.event.branches), '"name":"main"') }}"
          echo "Is  final state: ${{ github.event.state == 'success' || github.event.state == 'failure' || github.event.state == 'error' }}"

      - name: Dump payload
        run: echo '${{ toJson(github.event) }}' | jq .

      - name: Build channel data
        run: |
          OWNER=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f1)
          REPO=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)
          SHA="$GITHUB_SHA"
          BRANCH=${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}
          RUN_ID="$GITHUB_RUN_ID"
          CHANNEL_DATA=$(jq -n \
            --arg owner "$OWNER" \
            --arg repo "$REPO" \
            --arg sha "$SHA" \
            --arg branch "$BRANCH" \
            --arg run_id "$RUN_ID" \
            '{ owner: $owner, repo: $repo, sha: $sha, branch: $branch, run_id: $run_id }')

          echo "CHANNEL_DATA=$CHANNEL_DATA"
