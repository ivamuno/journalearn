name: Debug Meticulous Status Events

on:
  status:
  
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Event summary
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"

      - name: Dump payload
        run: echo '${{ toJson(github.event) }}' | jq .
